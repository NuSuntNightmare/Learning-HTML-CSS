<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button & CSS redirect</title>
  </head>
  <body>
    <h1>this is the page nr 2</h1>

    <button
      onclick="doSomething()"
      style="
        font-size: 25px;
        background-color: gray;
        color: lightblue;
        border-radius: 25px;
      "
    >
      click me
    </button>

    <p id="greeting">Hello</p>

    <script>
      function doSomething() {
        document.getElementById("greeting").innerHTML = "Goodbye";
      }
    </script>
  </body>
</html>
