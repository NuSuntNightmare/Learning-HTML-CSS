<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forms</title>
  </head>
  <body>
    <form action="index.php" method="POST" enctype="multipart/form-data">
      <label for="username">username:</label>
      <input
        type="text"
        placeholder="username"
        id="username"
        minlength="6"
        maxlength="16"
        required
      />
      <br />

      <label for="password">password:</label>
      <input
        type="password"
        placeholder="password"
        id="password"
        minlength="16"
        maxlength="16"
        required
      />
      <br />

      <label for="email">email:</label>
      <input type="email" placeholder="e.mail@gmail.com" id="email" required />
      <br />

      <label for="phone">phone #:</label>
      <input
        type="phone"
        placeholder="123-456-7890"
        id="phone"
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
        required
      />
      <br />

      <label for="bday">birthdate:</label>
      <input type="date" id="bday" required />
      <br />

      <label for="quantity">quantity:</label>
      <input type="number" id="quantity" min="0" max="999" value="1" />
      <br />

      <label for="title">title:</label>

      <input type="radio" id="Mr." value="Mr." />
      <label for="Mr.">Mr.</label>
      <input type="radio" id="Ms." value="Ms." />
      <label for="Ms.">Ms.</label>
      <input type="radio" id="PhD." value="PhD." />
      <label for="PhD.">PhD.</label>
      <br />

      <label for="payment">payment</label>
      <select>
        <option value="visa">visa</option>
        <option value="mastercard">mastercard</option>
        <option value="revolut">revolut</option>
      </select>
      <br />

      <label for="subscribe">subscribe</label>
      <input type="checkbox" id="subscribe" />
      <br />

      <label for="comment">comment</label>
      <textarea id="comment" rows="3" cols="25"></textarea>
      <br />

      <label for="file">file:</label>
      <input type="file" id="file" accept="image/png, image/jpeg" />
      <br />

      <input type="reset" />
      <br />
      <input type="submit" />
    </form>
  </body>
</html>
