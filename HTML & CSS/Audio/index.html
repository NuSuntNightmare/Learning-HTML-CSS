<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Incorporation</title>
  </head>
  <body>
    <p>Optimus Prime</p>
    <audio class="Mp3s" controls>
      <source
        src="mp3/io-sono-oprimus-prime.mp3"
        title="Optimus Prime"
        type="audio/mpeg"
      />
    </audio>
    <p>Viva e du</p>
    <audio class="Mp3s" controls autoplay muted loop>
      <source src="mp3/viva-el-du.mp3" title="Viva e du" type="audio/mpeg" />
    </audio>
    <p>Il Papa</p>
    <audio class="Mp3s" controls>
      <source
        src="mp3/oggi-prego-il-papa.mp3"
        title="Il Papa"
        type="audio/mpeg"
      />
    </audio>
  </body>
</html>
